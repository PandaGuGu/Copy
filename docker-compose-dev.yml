# ============================================================
# cakecake / MiniBili — Docker Compose (开发轻量版)
#
# 仅启动核心服务：MySQL + Redis + Go 后端 + Nginx 前端
# 不含 RabbitMQ（无视频转码）/ SRS（无直播）/ Elasticsearch（无搜索）
# 适合快速体验主页、登录、弹幕、评论、社交等核心功能。
#
# 用法:
#   1. cp .env.example .env（只需填 JWT_SECRET，其余默认值即可）
#   2. cd cakecake-vue/bilibili-vue && npm install && npm run build
#   3. docker compose -f docker-compose-dev.yml up -d
#
#   全功能版用 docker-compose.yml（含 RabbitMQ + SRS + ES 可选）。
# ============================================================

services:
  # ── 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: cake-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cakecake123}
      MYSQL_DATABASE: minibili
      MYSQL_USER: minibili
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cakecake123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cake-net

  # ── 缓存（必须，弹幕冷却 / 播放计数 / Token 管理） ──
  redis:
    image: redis:7-alpine
    container_name: cake-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cake-net

  # ── Go 后端（无 RabbitMQ / 无 ES） ──
  backend:
    build: .
    container_name: cake-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
      - HTTP_ADDR=:8080
      - MYSQL_DSN=${MYSQL_USER:-minibili}:${MYSQL_PASSWORD:-cakecake123}@tcp(mysql:3306)/minibili?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 不启动 RabbitMQ，视频转码置为不可用
      - RABBITMQ_URL=
      # 不启动 Elasticsearch，搜索页提示未就绪
      - ELASTICSEARCH_URL=
      - SENSITIVE_WORDS_FILE=./configs/sensitive_words.txt
      - TEMP_UPLOAD_DIR=/app/data/tmp
      - FFPROBE_PATH=ffprobe
      - FFMPEG_PATH=ffmpeg
      # 本地文件存储（无需 OSS）
      - OSS_ACCESS_KEY_ID=
      - OSS_ACCESS_KEY_SECRET=
      - OSS_BUCKET=
      - OSS_ENDPOINT=
      - OSS_PUBLIC_URL_PREFIX=
      # 网页端上传开关（开发模式可关）
      - VIDEO_UPLOAD_DISABLED=${VIDEO_UPLOAD_DISABLED:-false}
      # 管理员种子账号
      - ADMIN_SEED_USERNAME=${ADMIN_SEED_USERNAME:-admin}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-change-me-admin}
    volumes:
      - backend_tmp:/app/data/tmp
      - uploads_data:/app/data/uploads
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cake-net

  # ── 前端 Nginx ──
  frontend:
    image: nginx:alpine
    container_name: cake-frontend
    restart: unless-stopped
    volumes:
      - ./cakecake-vue/bilibili-vue/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend
    networks:
      - cake-net

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  backend_tmp:

networks:
  cake-net:
    driver: bridge
