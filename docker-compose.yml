# ============================================================
# cakecake / MiniBili — Docker Compose 一键部署
#
# 用法:
#   1. 复制 .env.example → .env（编辑 JWT_SECRET 即可，其余有默认值）
#   2. 构建前端: cd cakecake-vue/bilibili-vue && npm run build
#   3. docker compose up -d
#
# ⚠️ 生产部署前务必更改默认密码！
#   - MYSQL_ROOT_PASSWORD / MYSQL_PASSWORD（默认 cakecake123）
#   - RABBITMQ_DEFAULT_PASS（默认 guest）
#   - ADMIN_SEED_PASSWORD（默认 change-me-admin）
#   请在 .env 中覆盖上述变量。
#
# 包含: MySQL / Redis / RabbitMQ / SRS(直播) / Go后端 / Nginx
# 文件存储在本地卷 uploads_data，无需任何云服务。
# ============================================================

services:
  # ── 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: cake-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cakecake123}
      MYSQL_DATABASE: minibili
      MYSQL_USER: minibili
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cakecake123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cake-net

  # ── 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: cake-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cake-net

  # ── 消息队列（视频转码） ──
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cake-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cake-net

  # ── 直播推流服务器 ──
  srs:
    image: ossrs/srs:5
    container_name: cake-srs
    restart: unless-stopped
    volumes:
      - ./deploy/srs-docker.conf:/usr/local/srs/conf/srs.conf:ro
    ports:
      - "${SRS_RTMP_PORT:-1935}:1935"     # RTMP 推流
      - "${SRS_FLV_PORT:-8000}:8080"       # HTTP-FLV 播放
      - "${SRS_API_PORT:-1985}:1985"       # HTTP API
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1985/api/v1/versions || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cake-net
    depends_on:
      - backend

  # ── Go 后端 ──
  backend:
    build: .
    container_name: cake-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Docker 网络内地址覆盖
      - APP_ENV=${APP_ENV:-production}
      - HTTP_ADDR=:8080
      - MYSQL_DSN=${MYSQL_USER:-minibili}:${MYSQL_PASSWORD:-cakecake123}@tcp(mysql:3306)/minibili?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      - SENSITIVE_WORDS_FILE=./configs/sensitive_words.txt
      - TEMP_UPLOAD_DIR=/app/data/tmp
      - FFPROBE_PATH=ffprobe
      - FFMPEG_PATH=ffmpeg
      # 搜索（可选，留空则搜索页不可用）
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
      # 本地文件存储（无需任何 OSS/MinIO 配置）
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
      - OSS_BUCKET=${OSS_BUCKET:-}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-}
      - OSS_PUBLIC_URL_PREFIX=${OSS_PUBLIC_URL_PREFIX:-}
    volumes:
      - backend_tmp:/app/data/tmp
      - uploads_data:/app/data/uploads
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cake-net

  # ── 前端 Nginx ──
  frontend:
    image: nginx:alpine
    container_name: cake-frontend
    restart: unless-stopped
    volumes:
      - ./cakecake-vue/bilibili-vue/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend
    networks:
      - cake-net

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
  backend_tmp:

networks:
  cake-net:
    driver: bridge
