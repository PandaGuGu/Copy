<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cakecake ER Diagram (Core 43) · Full Project: 82 Tables</title>
<style>
  :root {
    --bg: #f8fafc;
    --grid: #e2e8f0;
    --card-bg: #ffffff;
    --border: #e2e8f0;
    --text-main: #0f172a;
    --text-sub: #64748b;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    
    /* 知识库 7 大业务域配色 */
    --c-video: #fb7185; --c-video-bg: #fff1f2;
    --c-social: #3b82f6; --c-social-bg: #eff6ff;
    --c-message: #10b981; --c-message-bg: #ecfdf5;
    --c-dynamic: #8b5cf6; --c-dynamic-bg: #f5f3ff;
    --c-article: #f59e0b; --c-article-bg: #fffbeb;
    --c-operation: #64748b; --c-operation-bg: #f8fafc;
    --c-coin: #ea580c; --c-coin-bg: #fff7ed;
    
    /* 辅助域配色 */
    --c-core: #0ea5e9; --c-core-bg: #f0f9ff;
    --c-history: #94a3b8; --c-history-bg: #f1f5f9;
    --c-admin: #475569; --c-admin-bg: #f8fafc;
    --c-agent: #ec4899; --c-agent-bg: #fdf2f8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--text-main);
  }

  /* Top Bar */
  .top-bar {
    height: 56px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    flex-shrink: 0;
    z-index: 100;
  }
  .top-bar-title {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #fb7185, #f59e0b);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 14px;
    box-shadow: 0 2px 4px rgba(251, 113, 133, 0.4);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sub);
    background: #f1f5f9;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Canvas */
  .canvas-container {
    flex: 1;
    position: relative;
    overflow: auto;
    background-color: var(--bg);
    background-image: radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .canvas {
    position: relative;
    width: 4500px;
    height: 3000px;
    transform-origin: top left;
  }
  .lines-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  /* Entity Cards */
  .card {
    position: absolute;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    z-index: 10;
    transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    cursor: default;
    min-width: 220px;
  }
  .card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    border-color: #cbd5e1;
    z-index: 20;
  }
  .card.dimmed { opacity: 0.3; transition: opacity 0.3s; }
  .card.highlighted { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2), var(--shadow-md); }

  .card-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #f1f5f9;
  }
  .card-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  
  /* Category Colors */
  .label-video { background: var(--c-video-bg); color: var(--c-video); }
  .label-social { background: var(--c-social-bg); color: var(--c-social); }
  .label-message { background: var(--c-message-bg); color: var(--c-message); }
  .label-dynamic { background: var(--c-dynamic-bg); color: var(--c-dynamic); }
  .label-article { background: var(--c-article-bg); color: var(--c-article); }
  .label-history { background: var(--c-history-bg); color: var(--c-history); }
  .label-coin { background: var(--c-coin-bg); color: var(--c-coin); }
  .label-admin { background: var(--c-admin-bg); color: var(--c-admin); }
  .label-agent { background: var(--c-agent-bg); color: var(--c-agent); }
  .label-operation { background: var(--c-operation-bg); color: var(--c-operation); }
  .label-core { background: var(--c-core-bg); color: var(--c-core); }

  .card-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-count {
    font-size: 10px;
    color: #94a3b8;
    font-weight: 600;
  }
  .card-fields {
    padding: 8px 10px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .field {
    font-size: 11px;
    color: #475569;
    padding: 3px 8px;
    background: #f8fafc;
    border: 1px solid #f1f5f9;
    border-radius: 6px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
  }
  .field.pk {
    background: #fff7ed;
    border-color: #fed7aa;
    color: #c2410c;
    font-weight: 600;
  }
  .field.fk {
    background: #eff6ff;
    border-color: #bfdbfe;
    color: #1d4ed8;
  }
  .field .icon {
    font-size: 8px;
    font-weight: 800;
    opacity: 0.9;
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    padding: 14px 18px;
    z-index: 200;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    max-width: 80vw;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #475569;
    font-weight: 600;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }
  .legend-divider {
    width: 1px;
    height: 16px;
    background: #e2e8f0;
    margin: 0 4px;
  }

  /* Zoom Controls */
  .zoom-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    display: flex;
    overflow: hidden;
    z-index: 200;
  }
  .zoom-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    color: #475569;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .zoom-btn:hover { background: #f1f5f9; color: var(--text-main); }
  .zoom-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .zoom-label {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12px;
    color: #64748b;
    font-weight: 700;
    min-width: 50px;
    justify-content: center;
    border-right: 1px solid var(--border);
  }
</style>
</head>

</div>

<div class="zoom-controls">

  <button class="zoom-btn" onclick="zoomIn()">+</button>
  <button class="zoom-btn" onclick="zoomReset()" style="font-size:11px; font-weight:700;">1:1</button>
</div>

<script>
// ---------- 43个实体定义（完整保留，坐标防重叠） ----------
const tables = [
  { id: 'video_view_histories', x: 80, y: 300, w: 220, fields: ['id PK','user_id FK','video_id FK','watched_seconds','total_seconds','progress','completed','created_at'], category: 'history' },

  { id: 'hot_search_ops', x: 750, y: 1360, w: 220, fields: ['id PK','keyword','icon_url','link_type','link_url','start_at','end_at','sort_order','is_active','created_at','updated_at'], category: 'operation' },
  { id: 'danmakus', x: 1150, y: 180, w: 220, fields: ['id PK','video_id FK','user_id FK','content','color','size','timestamp','opacity','created_at'], category: 'video' },

  { id: 'article_coins', x: 1450, y: 340, w: 220, fields: ['id PK','article_id FK','user_id FK','coin_amount','reason','created_at'], category: 'coin' },
  { id: 'article_comments', x: 1450, y: 500, w: 220, fields: ['id PK','article_id FK','user_id FK','content','parent_id','like_count','dislike_count','status','created_at','updated_at'], category: 'article' },
  { id: 'article_comment_likes', x: 1450, y: 780, w: 220, fields: ['id PK','comment_id FK','user_id FK','created_at'], category: 'article' },
  { id: 'article_comment_dislikes', x: 1450, y: 940, w: 220, fields: ['id PK','comment_id FK','user_id FK','created_at'], category: 'article' },
  { id: 'favorite_folders', x: 1450, y: 1100, w: 220, fields: ['id PK','user_id FK','name','sort_order','created_at','updated_at'], category: 'video' },
  { id: 'watch_laters', x: 1450, y: 1260, w: 220, fields: ['id PK','user_id FK','video_id FK','created_at'], category: 'video' },
  { id: 'user_follows', x: 1750, y: 180, w: 220, fields: ['id PK','follower_id FK','following_id FK','group_id FK','created_at'], category: 'social' },
  { id: 'user_blocks', x: 1750, y: 340, w: 220, fields: ['id PK','blocker_id FK','blocked_id FK','created_at'], category: 'social' },

  { id: 'user_follow_group_members', x: 1750, y: 660, w: 220, fields: ['id PK','group_id FK','following_id FK','created_at'], category: 'social' },
  { id: 'notifications', x: 1750, y: 820, w: 220, fields: ['id PK','user_id FK','type','title','content','target_type','target_id','is_read','created_at'], category: 'message' },

  { id: 'dynamic_comments', x: 2050, y: 780, w: 220, fields: ['id PK','dynamic_id FK','user_id FK','content','parent_id','like_count','dislike_count','status','created_at','updated_at'], category: 'dynamic' },
  { id: 'dynamic_comment_likes', x: 2050, y: 1040, w: 220, fields: ['id PK','comment_id FK','user_id FK','created_at'], category: 'dynamic' },
  { id: 'dynamic_comment_dislikes', x: 2050, y: 1180, w: 220, fields: ['id PK','comment_id FK','user_id FK','created_at'], category: 'dynamic' },

  { id: 'agent_settings', x: 1170, y: 40, w: 220, fields: ['id PK','agent_profile_id FK','auto_reply_message','greeting_message','working_hours','offline_message','language','created_at','updated_at'], category: 'agent' },
  { id: 'hot_search_display_layout', x: 1450, y: 40, w: 220, fields: ['id PK','layout_type','items_json','sort_order','is_active','created_at','updated_at'], category: 'operation' },

const catMap = {
  core: { label: 'Core', cls: 'label-core' },
  video: { label: 'Video', cls: 'label-video' },
  article: { label: 'Article', cls: 'label-article' },
  dynamic: { label: 'Dynamic', cls: 'label-dynamic' },
  social: { label: 'Social', cls: 'label-social' },
  message: { label: 'Message', cls: 'label-message' },
  history: { label: 'History', cls: 'label-history' },
  coin: { label: 'Coin', cls: 'label-coin' },
  operation: { label: 'Operation', cls: 'label-operation' },
  admin: { label: 'Admin', cls: 'label-admin' },
  agent: { label: 'Agent', cls: 'label-agent' },
};

const relations = [
  { from: 'users', to: 'videos', label: '发布', fromCard: '1', toCard: 'N' },
  { from: 'users', to: 'articles', label: '发布', fromCard: '1', toCard: 'N' },
  { from: 'users', to: 'user_dynamics', label: '发布', fromCard: '1', toCard: 'N' },
  { from: 'users', to: 'video_likes', label: '点赞', fromCard: 'N', toCard: 'M' },
  { from: 'videos', to: 'video_likes', label: '被赞', fromCard: '1', toCard: 'M' },
  { from: 'users', to: 'video_favorites', label: '收藏', fromCard: 'N', toCard: 'M' },
  { from: 'videos', to: 'video_favorites', label: '被收', fromCard: '1', toCard: 'M' },
  { from: 'users', to: 'video_coins', label: '投币', fromCard: 'N', toCard: 'M' },
  { from: 'videos', to: 'video_coins', label: '获币', fromCard: '1', toCard: 'M' },
  { from: 'users', to: 'comments', label: '评论', fromCard: '1', toCard: 'N' },
  { from: 'videos', to: 'comments', label: '被评', fromCard: '1', toCard: 'N' },
  { from: 'users', to: 'danmakus', label: '发送', fromCard: '1', toCard: 'N' },
  { from: 'videos', to: 'danmakus', label: '弹幕', fromCard: '1', toCard: 'N' },
  { from: 'users', to: 'user_follows', label: '关注', fromCard: 'N', toCard: 'M' },
  { from: 'users', to: 'dm_conversations', label: '参与', fromCard: 'N', toCard: 'M' },
  { from: 'users', to: 'video_view_histories', label: '观看', fromCard: '1', toCard: 'N' },
  { from: 'users', to: 'article_view_histories', label: '阅读', fromCard: '1', toCard: 'N' },
];

// ---------- 构建 DOM ----------
const canvas = document.getElementById('canvas');
const svg = document.getElementById('linesSvg');
const cardHeights = {};
const cardElements = {};

tables.forEach(t => {
  const cat = catMap[t.category] || { label: 'Other', cls: 'label-video' };
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + t.id;
  card.dataset.id = t.id;
  card.style.left = t.x + 'px';
  card.style.top = t.y + 'px';
  card.style.width = t.w + 'px';

  let fieldsHtml = '';
  t.fields.forEach(f => {
    let cls = 'field';
    let icon = '';
    if (f.includes('PK')) { cls += ' pk'; icon = '<span class="icon">PK</span>'; } 
    else if (f.includes('FK')) { cls += ' fk'; icon = '<span class="icon">FK</span>'; }
    fieldsHtml += `<span class="${cls}">${icon}${f.replace(/ PK| FK/g, '')}</span>`;
  });

  card.innerHTML = `
    <div class="card-header">
      <span class="card-label ${cat.cls}">${cat.label}</span>
      <span class="card-name">${t.id}</span>
      <span class="card-count">${t.fields.length}</span>
    </div>
    <div class="card-fields">${fieldsHtml}</div>
  `;
  canvas.appendChild(card);
  cardElements[t.id] = card;
  cardHeights[t.id] = 120;
});

requestAnimationFrame(() => {
  tables.forEach(t => {
    const el = cardElements[t.id];
    if (el) cardHeights[t.id] = el.offsetHeight || 120;
  });
  drawRelations();
});

// ---------- 智能边缘交点与方向计算（确保线条垂直引出） ----------
function getSmartEdgePoints(rect1, rect2) {
  const c1 = { x: rect1.x + rect1.w / 2, y: rect1.y + rect1.h / 2 };
  const c2 = { x: rect2.x + rect2.w / 2, y: rect2.y + rect2.h / 2 };
  const dx = c2.x - c1.x;
  const dy = c2.y - c1.y;
  let p1, p2, dir1, dir2;
  
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) {
      p1 = { x: rect1.x + rect1.w, y: c1.y }; p2 = { x: rect2.x, y: c2.y };
      dir1 = { x: 1, y: 0 }; dir2 = { x: -1, y: 0 };
    } else {
      p1 = { x: rect1.x, y: c1.y }; p2 = { x: rect2.x + rect2.w, y: c2.y };
      dir1 = { x: -1, y: 0 }; dir2 = { x: 1, y: 0 };
    }
  } else {
    if (dy > 0) {
      p1 = { x: c1.x, y: rect1.y + rect1.h }; p2 = { x: c2.x, y: rect2.y };
      dir1 = { x: 0, y: 1 }; dir2 = { x: 0, y: -1 };
    } else {
      p1 = { x: c1.x, y: rect1.y }; p2 = { x: c2.x, y: rect2.y + rect2.h };
      dir1 = { x: 0, y: -1 }; dir2 = { x: 0, y: 1 };
    }
  }
  return { p1, p2, dir1, dir2 };
}

// ---------- 绘制 Crow's Foot 符号 ----------
function drawCardinality(svg, x, y, dir, type) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const angle = Math.atan2(dir.y, dir.x) * 180 / Math.PI;
  g.setAttribute('transform', `translate(${x}, ${y}) rotate(${angle})`);
  
  // 垂直线 (mandatory marker)
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', 0); line.setAttribute('y1', -7);
  line.setAttribute('x2', 0); line.setAttribute('y2', 7);
  line.setAttribute('stroke', '#64748b'); line.setAttribute('stroke-width', '1.5');
  line.setAttribute('stroke-linecap', 'round');
  g.appendChild(line);

  if (type === 'N' || type === 'M') {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M 0,-7 L 12,0 L 0,7');
    path.setAttribute('stroke', '#64748b'); path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none'); path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    g.appendChild(path);
  }
  svg.appendChild(g);
  return g;
}

// ---------- 绘制联系（正交贝塞尔曲线） ----------
function drawRelations() {
  svg.innerHTML = '';
  relations.forEach(rel => {
    const fromTab = tables.find(t => t.id === rel.from);
    const toTab = tables.find(t => t.id === rel.to);
    if (!fromTab || !toTab) return;

    const rect1 = { x: fromTab.x, y: fromTab.y, w: fromTab.w, h: cardHeights[rel.from] };
    const rect2 = { x: toTab.x, y: toTab.y, w: toTab.w, h: cardHeights[rel.to] };
    const { p1, p2, dir1, dir2 } = getSmartEdgePoints(rect1, rect2);

    const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
    const offset = Math.max(60, dist * 0.4);
    const cp1 = { x: p1.x + dir1.x * offset, y: p1.y + dir1.y * offset };
    const cp2 = { x: p2.x + dir2.x * offset, y: p2.y + dir2.y * offset };

    const d = `M ${p1.x} ${p1.y} C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${p2.x} ${p2.y}`;
    
    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.classList.add('relation-group');
    group.dataset.from = rel.from;
    group.dataset.to = rel.to;

    const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hitArea.setAttribute('d', d); hitArea.setAttribute('stroke', 'transparent');
    hitArea.setAttribute('stroke-width', '20'); hitArea.setAttribute('fill', 'none');
    hitArea.style.pointerEvents = 'stroke';
    group.appendChild(hitArea);

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d); path.setAttribute('stroke', '#94a3b8');
    path.setAttribute('stroke-width', '1.5'); path.setAttribute('fill', 'none');
    path.classList.add('relation-path');
    group.appendChild(path);

    const cx = (p1.x + p2.x) / 2; const cy = (p1.y + p2.y) / 2;
    const textWidth = rel.label.length * 13 + 24;
    
    const labelRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    labelRect.setAttribute('x', cx - textWidth / 2); labelRect.setAttribute('y', cy - 13);
    labelRect.setAttribute('width', textWidth); labelRect.setAttribute('height', 26);
    labelRect.setAttribute('rx', 13); labelRect.setAttribute('fill', '#ffffff');
    labelRect.setAttribute('stroke', '#e2e8f0'); labelRect.setAttribute('stroke-width', '1');
    labelRect.classList.add('label-rect');
    group.appendChild(labelRect);

    const labelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    labelText.setAttribute('x', cx); labelText.setAttribute('y', cy + 4);
    labelText.setAttribute('text-anchor', 'middle'); labelText.setAttribute('font-size', '11');
    labelText.setAttribute('font-weight', '600'); labelText.setAttribute('fill', '#475569');
    labelText.textContent = rel.label;
    labelText.classList.add('label-text');
    group.appendChild(labelText);

    const sym1 = drawCardinality(group, p1.x + dir1.x * 10, p1.y + dir1.y * 10, dir1, rel.fromCard);
    const sym2 = drawCardinality(group, p2.x + dir2.x * 10, p2.y + dir2.y * 10, dir2, rel.toCard);

    group.addEventListener('mouseenter', () => {
      path.setAttribute('stroke', '#3b82f6'); path.setAttribute('stroke-width', '2.5');
      labelRect.setAttribute('stroke', '#3b82f6'); labelRect.setAttribute('fill', '#eff6ff');
      labelText.setAttribute('fill', '#1d4ed8');
      sym1.querySelectorAll('line, path').forEach(el => el.setAttribute('stroke', '#3b82f6'));
      sym2.querySelectorAll('line, path').forEach(el => el.setAttribute('stroke', '#3b82f6'));
    });
    group.addEventListener('mouseleave', () => {
      path.setAttribute('stroke', '#94a3b8'); path.setAttribute('stroke-width', '1.5');
      labelRect.setAttribute('stroke', '#e2e8f0'); labelRect.setAttribute('fill', '#ffffff');
      labelText.setAttribute('fill', '#475569');
      sym1.querySelectorAll('line, path').forEach(el => el.setAttribute('stroke', '#64748b'));
      sym2.querySelectorAll('line, path').forEach(el => el.setAttribute('stroke', '#64748b'));
    });

    svg.appendChild(group);
  });
}

// ---------- 缩放 / 拖拽 ----------
let zoomLevel = 0.75;
const container = document.getElementById('canvasContainer');

function applyZoom() {
  canvas.style.transform = `scale(${zoomLevel})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
}
function zoomIn() { zoomLevel = Math.min(1.5, zoomLevel + 0.1); applyZoom(); }
function zoomOut() { zoomLevel = Math.max(0.3, zoomLevel - 0.1); applyZoom(); }
function zoomReset() { zoomLevel = 0.75; applyZoom(); }
applyZoom();

let isPanning = false, panStartX, panStartY;
container.addEventListener('mousedown', e => {
  if (e.target === container || e.target === canvas || e.target === svg) {
    isPanning = true;
    panStartX = e.clientX + container.scrollLeft;
    panStartY = e.clientY + container.scrollTop;
    container.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  container.scrollLeft = panStartX - e.clientX;
  container.scrollTop = panStartY - e.clientY;
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  container.style.cursor = '';
});
</script>
