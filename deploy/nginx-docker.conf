# Docker Nginx — SPA + API reverse proxy + WebSocket + local uploads
server {
    listen 80;
    server_name _;
    client_max_body_size 520m;

    root /usr/share/nginx/html;
    index index.html;

    # Local file uploads (served directly from shared Docker volume)
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API + WebSocket (danmaku / chat / live chat)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SRS HTTP-FLV streams (live)
    location /live/ {
        proxy_pass http://srs:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SRS API
    location /srs/ {
        proxy_pass http://srs:1985;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
