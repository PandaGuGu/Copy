# SRS Docker configuration — RTMP + HTTP-FLV + HTTP Callback
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # HTTP callback: notify Go backend when stream starts/ends
    http_hooks {
        enabled     on;
        on_publish  http://backend:8080/api/v1/live/callback/on_publish;
        on_unpublish http://backend:8080/api/v1/live/callback/on_done;
    }
}
